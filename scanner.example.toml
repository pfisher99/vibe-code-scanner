root_path = "."
export_dir = "scan-runs"

base_url = "http://127.0.0.1:8000"
model_name = "Qwen3.5-9B-local"
api_style = "chat_completions"
tokenizer_mode = "vllm"

scan_mode = "security_and_quality"

# Qwen3.5 local thinking-mode defaults for precise coding tasks.
temperature = 0.6
top_p = 0.95
top_k = 20
min_p = 0.0
presence_penalty = 0.0
repetition_penalty = 1.0
# Send a per-request reasoning budget to vLLM/Qwen-style endpoints.
# Set this to false when using an external provider that does not support it.
thinking_token_budget_enabled = true
thinking_token_budget = 4096
# Research mode gets a larger answer/thinking budget by default.
research_max_tokens_per_request = 16384
research_thinking_token_budget = 8192

max_concurrent_requests = 4
# Keep Small for Qwen3.5 as it will think forever
max_tokens_per_request = 8192
# Our local max is 64K per request, max 256K total across 4 workers
chunk_target_tokens = 50000
chunk_overlap_tokens = 2000

request_timeout_seconds = 300.0
retry_count = 2
max_file_size_bytes = 1048576

research = false
# Optional final research tools for the post-scan pass.
# `duckduckgo` works without any extra local service or Python dependency.
# Use `searxng` only if you explicitly want to point at your own instance.
search_backend = "duckduckgo"
search_base_url = ""
research_max_results = 3

include_globs = [
  "**/*.c",
  "**/*.cc",
  "**/*.cpp",
  "**/*.cs",
  "**/*.css",
  "**/*.go",
  "**/*.h",
  "**/*.hpp",
  "**/*.html",
  "**/*.java",
  "**/*.js",
  "**/*.json",
  "**/*.jsx",
  "**/*.kt",
  "**/*.kts",
  "**/*.php",
  "**/*.ps1",
  "**/*.py",
  "**/*.rb",
  "**/*.rs",
  "**/*.scala",
  "**/*.sh",
  "**/*.sql",
  "**/*.svelte",
  "**/*.swift",
  "**/*.tf",
  "**/*.toml",
  "**/*.ts",
  "**/*.tsx",
  "**/*.vue",
  "**/*.xml",
  "**/*.yaml",
  "**/*.yml",
  "**/Dockerfile",
  "**/requirements.txt",
  "**/requirements-*.txt",
]

exclude_globs = [
  "**/*.min.css",
  "**/*.min.js",
  "**/*.map",
  "**/*.lock",
  "**/package-lock.json",
  "**/pnpm-lock.yaml",
  "**/yarn.lock",
]

ignored_directories = [
  ".git",
  ".hg",
  ".idea",
  ".mypy_cache",
  ".next",
  ".nuxt",
  ".pytest_cache",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pycache__",
  "bin",
  "build",
  "coverage",
  "dist",
  "node_modules",
  "obj",
  "out",
  "target",
  "temp",
  "tmp",
  "venv",
]
