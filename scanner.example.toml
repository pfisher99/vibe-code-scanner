root_path = "."
export_dir = "scan-runs"

base_url = "http://127.0.0.1:8000"
model_name = "Qwen3.5-9B-local"
api_style = "chat_completions"

scan_mode = "security_and_quality"

max_concurrent_requests = 4
# Sample budget for a 64k per-request context window:
# about 44k chunk input + up to 16k output + prompt/metadata headroom.
max_tokens_per_request = 16000
chunk_target_tokens = 44000
chunk_overlap_tokens = 2000

request_timeout_seconds = 300.0
retry_count = 2
max_file_size_bytes = 1048576

research = false
search_backend = "none"
search_base_url = ""
research_max_results = 3

include_globs = [
  "**/*.c",
  "**/*.cc",
  "**/*.cpp",
  "**/*.cs",
  "**/*.css",
  "**/*.go",
  "**/*.h",
  "**/*.hpp",
  "**/*.html",
  "**/*.java",
  "**/*.js",
  "**/*.json",
  "**/*.jsx",
  "**/*.kt",
  "**/*.kts",
  "**/*.php",
  "**/*.ps1",
  "**/*.py",
  "**/*.rb",
  "**/*.rs",
  "**/*.scala",
  "**/*.sh",
  "**/*.sql",
  "**/*.svelte",
  "**/*.swift",
  "**/*.tf",
  "**/*.toml",
  "**/*.ts",
  "**/*.tsx",
  "**/*.vue",
  "**/*.xml",
  "**/*.yaml",
  "**/*.yml",
  "**/Dockerfile",
  "**/requirements.txt",
  "**/requirements-*.txt",
]

exclude_globs = [
  "**/*.min.css",
  "**/*.min.js",
  "**/*.map",
  "**/*.lock",
  "**/package-lock.json",
  "**/pnpm-lock.yaml",
  "**/yarn.lock",
]

ignored_directories = [
  ".git",
  ".hg",
  ".idea",
  ".mypy_cache",
  ".next",
  ".nuxt",
  ".pytest_cache",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pycache__",
  "bin",
  "build",
  "coverage",
  "dist",
  "node_modules",
  "obj",
  "out",
  "target",
  "temp",
  "tmp",
  "venv",
]
